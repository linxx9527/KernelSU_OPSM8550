name: 8750A

on:
  workflow_dispatch:
    inputs:
      clang_version:
        description: 'Clang 版本'
        required: true
        type: choice
        default: clang-r563880c
        options:
          - clang-r416183b1
          - clang-r450784d
          - clang-r487747c
          - clang-r536225
          - clang-r547379
          - clang-r563880c

      kernel_source:
        description: 'Kernel Source（推荐用你自己的 fork）'
        required: true
        type: choice
        options:
          - LineageOS
          - crdroidandroid
          - OnePlus12R-development
          - YAAP
          - linxx9527   # ← 上游原版（用于测试同步）

      kernel_branch:
        description: 'Kernel Branch（例如：lineage-23.2 sixteen-qpr1）'
        required: true
        type: string
        default: ""

      ksu_type:
        description: 'KernelSU 版本（含 SUSFS）'
        required: true
        type: choice
        options:
          - None
          - Official-KernelSU
          - KernelSU-Next
          - KernelSU-Next-with-susfs
          - KowSU
          - KernelSU-by-xx
          - ReSukiSU
          - ReSukiSU-with-susfs

      susfs-gki:
        description: 'SUSFS-GKI（选 None 则关闭）'
        required: true
        type: choice
        default: None
        options:
          - None
          - android15-6.6
          - android16-6.12

      io_scheduler:
        description: 'IO 调度器'
        required: false
        type: choice
        options:
          - none
          - adios
          - kyber
          - bfq
        default: adios

      kernel_suffix:
        description: '内核后缀（留空默认，如 mykernel）'
        required: false
        type: string
        default: ""

      better_net:
        description: '网络增强（ipset/iptables）'
        required: true
        type: boolean
        default: false

      bbr_enable:
        description: 'BBR 拥塞控制'
        required: true
        type: choice
        default: 'default'
        options:
          - 'false'
          - 'true'
          - 'default'

      ccache_enable:
        description: '启用 CCACHE（加速二次编译）'
        required: true
        type: boolean
        default: false

jobs:
  Kernel_CI:
    env:
      GH_TOKEN: ${{ github.token }}
      SOC: sm8750
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      checks: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup SWAP
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev libelf-dev libdw-dev \
            build-essential lz4 git python3 curl dwarves cpio gcc-aarch64-linux-gnu
          if [[ "${{ inputs.ccache_enable }}" == "true" ]]; then
            sudo apt install -y ccache
          fi

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b ${{ inputs.kernel_branch }} \
            https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_${{ env.SOC }}.git ${{ env.SOC }}
          git clone --depth=1 -b ${{ inputs.kernel_branch }} \
            https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_${{ env.SOC }}-modules.git ${{ env.SOC }}-modules || true

      - name: Download AOSP Clang
        run: |
          mkdir -p toolchains/${{ inputs.clang_version }}
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/${{ inputs.clang_version }}.tar.gz
          tar -xf "${{ inputs.clang_version }}.tar.gz" -C "toolchains/${{ inputs.clang_version }}"
          rm -f "${{ inputs.clang_version }}.tar.gz"

      - name: Compile Kernel
        run: |
          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/${{ inputs.clang_version }}/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC="${CLANG_ROOT}/clang"
          export CXX="${CLANG_ROOT}/clang++"
          export HOSTCC="${CLANG_ROOT}/clang"
          export HOSTCXX="${CLANG_ROOT}/clang++"
          export LD="${CLANG_ROOT}/ld.lld"
          export AR="${CLANG_ROOT}/llvm-ar"
          export NM="${CLANG_ROOT}/llvm-nm"
          export OBJCOPY="${CLANG_ROOT}/llvm-objcopy"
          export OBJDUMP="${CLANG_ROOT}/llvm-objdump"
          export STRIP="${CLANG_ROOT}/llvm-strip"

          if [[ "${{ inputs.ccache_enable }}" == "true" ]]; then
            export CCACHE_DIR="${{ github.workspace }}/.ccache"
            export CC="ccache clang"
            export CXX="ccache clang++"
            export HOSTCC="ccache clang"
            export HOSTCXX="ccache clang++"
          fi

          cd ${{ env.SOC }}

          # KernelSU + SUSFS 集成
          case "${{ inputs.ksu_type }}" in
            "None") ;;
            "Official-KernelSU") curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main ;;
            "KowSU") curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh" | bash -s master ;;
            "KernelSU-Next") curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s dev ;;
            "KernelSU-Next-with-susfs") curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs ;;
            "KernelSU-by-xx") curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/refs/heads/master/kernel/setup.sh" | bash -s master ;;
            "ReSukiSU"|"ReSukiSU-with-susfs") curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s builtin ;;
          esac

          # SUSFS 补丁（仅 GKI）
          if [[ "${{ inputs.ksu_type }}" == *susfs* && "${{ inputs.susfs-gki }}" != "None" ]]; then
            git clone -b gki-${{ inputs.susfs-gki }} https://gitlab.com/simonpunk/susfs4ksu.git susfs
            cd susfs
            cp ./kernel_patches/50_add_susfs_in_gki-${{ inputs.susfs-gki }}.patch ..
            cp ./kernel_patches/fs/* ../fs/
            cp ./kernel_patches/include/linux/* ../include/linux/
            cd ..
            patch -p1 < 50_add_susfs_in_gki-${{ inputs.susfs-gki }}.patch
          fi

          touch ./.scmversion
          echo "CONFIG_ERHAI_DTB=y" >> arch/arm64/configs/gki_defconfig

          if [[ "${{ inputs.ksu_type }}" != "None" ]]; then
            echo "CONFIG_TMPFS_XATTR=y" >> arch/arm64/configs/gki_defconfig
          fi

          make O=out gki_defconfig

          # 合并 vendor 配置
          for cfg in vendor/sun_perf.config vendor/oplus/sun_perf.config; do
            if [ -f "$cfg" ]; then
              scripts/kconfig/merge_config.sh -O out -m out/.config "$cfg" || true
            fi
          done

          # IO Scheduler
          case "${{ inputs.io_scheduler }}" in
            adios)
              scripts/config --file out/.config --enable CONFIG_MQ_IOSCHED_ADIOS
              scripts/config --file out/.config --enable CONFIG_MQ_IOSCHED_DEFAULT_ADIOS ;;
            kyber) scripts/config --file out/.config --enable CONFIG_MQ_IOSCHED_KYBER ;;
            bfq) scripts/config --file out/.config --enable CONFIG_BFQ_GROUP_IOSCHED ;;
          esac

          # 网络增强
          if [[ "${{ inputs.better_net }}" == "true" ]]; then
            scripts/config --file out/.config --enable CONFIG_BPF_STREAM_PARSER
            scripts/config --file out/.config --enable CONFIG_NETFILTER_XT_MATCH_ADDRTYPE
            scripts/config --file out/.config --enable CONFIG_NETFILTER_XT_SET
            scripts/config --file out/.config --enable CONFIG_IP_SET
            scripts/config --file out/.config --set-val CONFIG_IP_SET_MAX 65534
          fi

          # BBR
          if [[ "${{ inputs.bbr_enable }}" != "false" ]]; then
            scripts/config --file out/.config --enable CONFIG_TCP_CONG_ADVANCED
            scripts/config --file out/.config --enable CONFIG_TCP_CONG_BBR
            scripts/config --file out/.config --enable CONFIG_TCP_CONG_CUBIC
            if [[ "${{ inputs.bbr_enable }}" == "default" ]]; then
              scripts/config --file out/.config --set-val CONFIG_DEFAULT_TCP_CONG bbr
            else
              scripts/config --file out/.config --set-val CONFIG_DEFAULT_TCP_CONG cubic
            fi
          fi

          # 后缀处理
          if [[ -n "${{ inputs.kernel_suffix }}" ]]; then
            sed -i "\$s|echo \"\\\$res\"|echo \"-${{ inputs.kernel_suffix }}\"|" scripts/setlocalversion
            sed -i 's/${scm_version}//' scripts/setlocalversion
            echo "CONFIG_LOCALVERSION_AUTO=n" >> arch/arm64/configs/gki_defconfig
          fi

          make -j$(nproc) O=out KCFLAGS=-O2 Image

      - name: Make AnyKernel3
        run: |
          ZIP_NAME="${{ inputs.ksu_type }}_${{ inputs.kernel_suffix }}_$(date -u +"%Y%m%d_%H%M")"
          git clone https://github.com/Kernel-SU/AnyKernel3.git
          cp ${{ env.SOC }}/out/arch/arm64/boot/Image AnyKernel3/Image
          cd AnyKernel3
          zip -r9 ../"${ZIP_NAME}.zip" * -x .git

      - name: Create GitHub Release
        run: |
          REL_NAME="sm8750_${{ inputs.kernel_source }}_${{ inputs.kernel_branch }}_${{ inputs.ksu_type }}_$(date -u +"%Y%m%d_%H%M")"
          ZIP_FILE=$(ls *.zip)
          gh release create "$REL_NAME" --title "$REL_NAME" --notes "Built with My 8750B" "${ZIP_FILE}" Image
